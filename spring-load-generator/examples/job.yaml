job_name: oracle-cdc-controlled
bootstrap_servers: my-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092
duration_seconds: 600
workers:
  - name: customers-fast
    topic: oracle-cdc-events
    messages_per_second: 25
    key_prefix: cust-fast-
  - name: customers-slow
    topic: oracle-cdc-events-low
    messages_per_second: 5
    key_prefix: cust-slow-
source:
  version: 2.6.0.Final
  connector: oracle
  name: oracle-cdc
  db: ORCLCDB
  schema: DEBEZIUM
  table: CUSTOMERS
  snapshot: "false"
  transaction_prefix: tx
  scn_prefix: scn
