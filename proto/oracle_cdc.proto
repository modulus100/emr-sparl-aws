syntax = "proto3";

package cdc.oracle.v1;

option java_multiple_files = true;
option java_package = "org.example.protobuf.cdc.oracle.v1";
option java_outer_classname = "OracleCdcProto";

message OracleSourceMetadata {
  string version = 1;
  string connector = 2;
  string name = 3;
  int64 ts_ms = 4;
  string snapshot = 5;
  string db = 6;
  string schema = 7;
  string table = 8;
  string tx_id = 9;
  string scn = 10;
  int64 commit_scn = 11;
}

message CustomerState {
  string id = 1;
  string first_name = 2;
  string last_name = 3;
  string email = 4;
  string status = 5;
  double credit_limit = 6;
  string city = 7;
  string country = 8;
  string source_system = 9;
  string payload_padding = 10;
  string phone_number = 11;
  string middle_name = 12;
  string date_of_birth = 13;
  string loyalty_tier = 14;
  string account_number = 15;
  string postal_code = 16;
  string state = 17;
  string street_address = 18;
  string company = 19;
  string department = 20;
  string job_title = 21;
  string preferred_language = 22;
  bool marketing_opt_in = 23;
  int32 risk_score = 24;
  int64 last_login_ts_ms = 25;
  string updated_by = 26;
  string segment = 27;
  string tax_id = 28;
  string external_reference = 29;
  string notes = 30;
}

message OracleCdcEnvelope {
  CustomerState before = 1;
  CustomerState after = 2;
  OracleSourceMetadata source = 3;
  string op = 4;
  int64 ts_ms = 5;
  string transaction_id = 6;
}
