apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: oracle-kafka
  namespace: kafka
  annotations:
    strimzi.io/node-pools: enabled
    strimzi.io/kraft: enabled
spec:
  kafka:
    version: 4.1.0
    metadataVersion: 4.1-IV1
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
    config:
      offsets.topic.replication.factor: 1
      transaction.state.log.replication.factor: 1
      transaction.state.log.min.isr: 1
      default.replication.factor: 1
      min.insync.replicas: 1
  entityOperator:
    topicOperator:
      resources:
        requests:
          cpu: "20m"
          memory: 96Mi
        limits:
          cpu: "150m"
          memory: 192Mi
    userOperator:
      resources:
        requests:
          cpu: "20m"
          memory: 96Mi
        limits:
          cpu: "150m"
          memory: 192Mi
  kafkaExporter:
    topicRegex: ".*"
    groupRegex: ".*"
    resources:
      requests:
        cpu: "20m"
        memory: 96Mi
      limits:
        cpu: "100m"
        memory: 192Mi
