apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-exporter
  namespace: kafka
  labels:
    app: kafka-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-exporter
  template:
    metadata:
      labels:
        app: kafka-exporter
    spec:
      containers:
        - name: kafka-exporter
          image: docker.io/danielqsj/kafka-exporter:v1.7.0
          args:
            - "--kafka.server=oracle-kafka-kafka-bootstrap.kafka.svc:9092"
            - "--group.filter=.*"
            - "--topic.filter=.*"
            - "--offset.show-all"
          ports:
            - name: metrics
              containerPort: 9308
          resources:
            requests:
              cpu: "20m"
              memory: 64Mi
            limits:
              cpu: "200m"
              memory: 256Mi
