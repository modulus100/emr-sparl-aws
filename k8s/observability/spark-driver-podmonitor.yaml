apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: spark-driver-metrics
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames:
      - emr
  selector:
    matchLabels:
      spark-role: driver
      monitoring: enabled
  podMetricsEndpoints:
    - targetPort: 4040
      path: /metrics/executors/prometheus
      interval: 30s
      scrapeTimeout: 10s
      relabelings:
        - sourceLabels: [__meta_kubernetes_pod_label_spark_app_name]
          targetLabel: spark_app_name
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
